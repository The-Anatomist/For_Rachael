<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Rachael</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6c5ce7;
            --accent: #a29bfe;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 6px; background: rgba(0,0,0,0.1); z-index: 1000; }
        #progress-bar { height: 100%; width: 0%; background: white; box-shadow: 0 0 10px white; transition: width 0.5s ease; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 85%;
            max-width: 500px;
            min-height: 480px;
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .slide { display: none; animation: slideIn 0.5s ease forwards; }
        .active { display: block; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .countdown-timer {
            background: rgba(108, 92, 231, 0.1);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: var(--primary);
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .timer-digits { font-size: 1.2rem; display: block; margin-top: 5px; color: #e73c7e; }

        p { color: #444; line-height: 1.6; font-size: 1.2rem; min-height: 130px; display: flex; align-items: center; justify-content: center; margin: 20px 0;}
        .icon-box { font-size: 3.5rem; margin-bottom: 10px; height: 70px; }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px #f1c40f); }
            50% { transform: scale(1.3); filter: drop-shadow(0 0 15px #f1c40f); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0px #f1c40f); }
        }
        .pulse-star { animation: pulse 1.5s infinite ease-in-out; display: inline-block; }

        .typewriter::after { content: "|"; animation: blink 0.7s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        input { padding: 12px; border: 2px solid var(--accent); border-radius: 12px; width: 80%; margin-bottom: 20px; text-align: center; font-size: 1rem; outline: none; }
        .btn-group { margin-top: 10px; display: flex; justify-content: center; gap: 10px; min-height: 50px; }
        
        button { padding: 12px 25px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .secondary-btn { background: rgba(0,0,0,0.05); color: #555; }
    </style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="Unstoppable.m4a" type="audio/mpeg">
</audio>

<div id="progress-container"><div id="progress-bar"></div></div>

<div class="card">
    <div id="slide-0" class="slide active">
        <div class="icon-box"><i class="fas fa-heart" style="color: #e73c7e;"></i></div>
        <h2>A Message for You</h2>
        
        <div class="countdown-timer" id="timer">
            Preparing your countdown...
        </div>

        <p style="min-height: auto; margin: 10px 0; font-size: 1rem;">Enter your name to begin:</p>
        <input type="text" id="nameInput" placeholder="Enter your name...">
        <br>
        <button onclick="checkName()">Unlock Card</button>
    </div>

    <div id="message-container" class="slide">
        <div class="icon-box" id="dynamic-icon"></div>
        <p id="type-area" class="typewriter"></p>
        
        <div class="btn-group">
            <button id="prevBtn" class="secondary-btn" onclick="changeSlide(-1)">Back</button>
            <button id="nextBtn" onclick="changeSlide(1)">Next</button>
            <button id="restartBtn" class="secondary-btn" onclick="location.reload()" style="display:none;">Read Again</button>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        recipient: "Rachael",
        examDate: new Date("Oct 26, 2026 08:30:00").getTime(),
        messages: [
            "Dear Rachael, I hope you are doing well.",
            "As you prepare for your KJSEA exams at the end of the year, I want you to remember something very important.",
            "You are capable, strong, and able to succeed.",
            "I know that preparing for exams can sometimes feel overwhelming or stressful.",
            "There may be days when the work feels heavy or when you doubt yourself.",
            "But in those moments, I want you to remember how far you have already come.",
            "Every lesson you study, every question you practice, and every effort you make is helping you grow stronger and more prepared.",
            "Please never underestimate yourself.",
            "You have been learning, improving, and building your knowledge step by step.",
            "Even when progress feels slow, it is still progress.",
            "Your hard work, patience, and determination will guide you when the exam time comes.",
            "I truly believe in you, Rachael.",
            "You are more capable than you may sometimes realize.",
            "Whenever things feel difficult, pause for a moment, take a deep breath, and remind yourself that you can do this.",
            "Challenges are not there to stop you—they are there to help you discover just how strong and capable you really are.",
            "Remember, I went through the same exams and passed them.",
            "I know what it feels like to face them, and I also know that with effort and belief in yourself, success is possible.",
            "If I could do it, you can do it too.",
            "You have the strength and ability to achieve great results.",
            "Stay determined, stay positive, and keep believing in yourself.",
            "I am proud of you, Rachael, and confident that you will do your best.",
            "Wishing you success and strength as you prepare.",
            "With encouragement and belief in you, [T.I.A]"
        ],
        speed: 40
    };

    let currentIdx = -1;
    let typingTimer = null;

    // Enter key listener
    document.getElementById('nameInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkName();
        }
    });

    const countdownInterval = setInterval(function() {
        const now = new Date().getTime();
        const distance = CONFIG.examDate - now;
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);
        const timerEl = document.getElementById('timer');

        if (distance < 0) {
            clearInterval(countdownInterval);
            timerEl.innerHTML = "🌟 EXAM SEASON IS HERE!<br><span class='timer-digits'>You've got this, Rachael!</span>";
        } else {
            timerEl.innerHTML = `COUNTDOWN TO SUCCESS:<br><span class="timer-digits">${days}d ${hours}h ${minutes}m ${seconds}s</span>`;
        }
    }, 1000);

    function checkName() {
        const val = document.getElementById('nameInput').value.trim().toLowerCase();
        if (val === CONFIG.recipient.toLowerCase()) {
            clearInterval(countdownInterval);
            
            // START MUSIC HERE
            const music = document.getElementById('bgMusic');
            music.play().catch(e => console.log("Audio play blocked until interaction."));
            
            document.getElementById('slide-0').style.display = 'none';
            document.getElementById('message-container').style.display = 'block';
            goToSlide(0);
        } else {
            alert("This card is specifically for Rachael!");
        }
    }

    function changeSlide(n) {
        let target = currentIdx + n;
        if (target >= 0 && target < CONFIG.messages.length) {
            clearTimeout(typingTimer);
            goToSlide(target);
        }
    }

    function goToSlide(n) {
        currentIdx = n;
        const total = CONFIG.messages.length;
        const iconArea = document.getElementById('dynamic-icon');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        
        document.getElementById('progress-bar').style.width = ((n + 1) / total) * 100 + "%";
        
        if (n < 5) iconArea.innerHTML = '<i class="fas fa-book-open" style="color: var(--primary);"></i>';
        else if (n < 15) iconArea.innerHTML = '<i class="fas fa-lightbulb" style="color: #f1c40f;"></i>';
        else if (n < total - 1) iconArea.innerHTML = '<i class="fas fa-graduation-cap" style="color: #3498db;"></i>';
        else iconArea.innerHTML = '<div class="pulse-star"><i class="fas fa-star" style="color: #f1c40f;"></i></div>';

        if (n === 0) {
            prevBtn.style.display = 'none';
            nextBtn.style.margin = '0 auto'; 
        } else {
            prevBtn.style.display = 'block';
            nextBtn.style.margin = '0';
        }

        nextBtn.style.display = (n === total - 1) ? 'none' : 'block';
        document.getElementById('restartBtn').style.display = (n === total - 1) ? 'block' : 'none';

        typeEffect(document.getElementById('type-area'), CONFIG.messages[n]);

        if (n === total - 1) {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    }

    function typeEffect(el, text) {
        el.innerHTML = "";
        let i = 0;
        function play() {
            if (i < text.length) {
                el.innerHTML += text.charAt(i);
                i++;
                typingTimer = setTimeout(play, CONFIG.speed);
            }
        }
        play();
    }
</script>
</body>
</html>
